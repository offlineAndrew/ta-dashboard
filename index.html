<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b0e0f;color:#d8e0e0;font-family:'JetBrains Mono','SF Mono',Consolas,monospace;padding:16px;font-size:13px;min-height:100vh;}
.wrap{max-width:760px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #1e2a2b;padding-bottom:12px;margin-bottom:18px;}

.sub{font-size:10px;color:#3a4e50;}

input[type=text]{flex:1;min-width:140px;background:#111718;border:1px solid #1e2a2b;border-radius:4px;color:#d8e0e0;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;text-transform:uppercase;}
input[type=text]::placeholder{color:#2e4a4c;text-transform:none;}

.n-input{width:58px;background:#111718;border:1px solid #1e2a2b;border-radius:4px;color:#d8e0e0;padding:10px 8px;font-size:13px;font-family:inherit;outline:none;text-align:center;}
.n-label{font-size:11px;color:#3a4e50;white-space:nowrap;}
button{background:#9be8a8;color:#0b0e0f;border:none;border-radius:4px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.05em;}

/* Cards */
.card{background:#111718;border:1px solid #1e2a2b;border-radius:6px;padding:14px 16px;margin-bottom:10px;}
.card-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;border-bottom:1px solid #1a2425;padding-bottom:8px;}

.line{font-size:12px;color:#aab4b4;margin-bottom:5px;line-height:1.7;}
.section-label{font-size:10px;color:#3a4e50;letter-spacing:.08em;margin-bottom:5px;margin-top:9px;}
.up{color:#9be8a8;} .dn{color:#ff9b9b;} .warn{color:#ffb86b;font-weight:700;} .crit{color:#ff6b6b;font-weight:700;} .neutral{color:#aab4b4;}
.result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.copy-btn{background:transparent;border:1px solid #1e2a2b;border-radius:4px;color:#7a8a8a;padding:8px 14px;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.05em;}

.candle-chart{display:flex;align-items:flex-end;gap:2px;height:60px;padding:0 2px;position:relative;}

.vol-fill-inline{height:100%;border-radius:2px;}
.div-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;margin-left:4px;}
.level-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #141e1f;font-size:11px;}
.level-row:last-child{border-bottom:none;}
#output{display:none;}

<body>
<div class="wrap">
  <div class="header">
    <span class="title">TA · TERMINAL</span>
    <span class="sub">Binance Futures · live data</span>
  </div>
  <div class="input-row">
    <input type="text" id="sym" placeholder="ESPORTSUSDT, BTCUSDT..." />
    <span class="n-label">свечей:</span>
    <input type="number" id="nCandles" class="n-input" value="20" min="5" max="50"/>
    <button id="goBtn" onclick="run()">GO</button>
  </div>
  <div id="error" class="error" style="display:none"></div>
  <div id="output">
    <div class="result-head">
      <span style="font-size:11px;color:#3a4e50" id="rTs"></span>
      <button class="copy-btn" id="copyBtn" onclick="copyText()">КОПИРОВАТЬ СВОДКУ</button>
    </div>
    <div id="tickerBar" class="ticker-bar"></div>
    <div id="checklist" class="checklist"></div>
    <div id="cards"></div>
    <div class="hint">Нажми "Копировать сводку" → вставь в чат → анализ без скринов</div>
  </div>
  <div id="empty" class="empty">
    Введи тикер перпа и нажми GO<br>
    <span style="font-size:11px">BTCUSDT · ESPORTSUSDT · XPLUSDT · IDUSDT</span><br>
    <span style="font-size:10px;color:#1e2a2b">MA · RSI · MACD · ATR · Боллинджер · Дивергенция · Уровни · Чеклист</span>
  </div>
</div>

<script>
const TFS=[{key:"15m",label:"15M"},{key:"1h",label:"1H"},{key:"4h",label:"4H"},{key:"1d",label:"1D"}];

// ---- Math ----
function sma(v,p){if(v.length<p)return null;return v.slice(v.length-p).reduce((a,b)=>a+b,0)/p;}
function emaSeries(v,p){
  if(v.length<p)return[];const k=2/(p+1);
  let e=v.slice(0,p).reduce((a,b)=>a+b,0)/p;const out=[e];
  for(let i=p;i<v.length;i++){e=v[i]*k+e*(1-k);out.push(e);}return out;
}
function emaLast(v,p){const s=emaSeries(v,p);return s.length?s[s.length-1]:null;}
function rsi(v,p){
  if(v.length<p+1)return null;let g=0,l=0;
  for(let i=v.length-p;i<v.length;i++){const d=v[i]-v[i-1];if(d>=0)g+=d;else l-=d;}
  const ag=g/p,al=l/p;if(al===0)return 100;return 100-100/(1+ag/al);
}
function calcMACD(v){
  const fast=emaSeries(v,12),slow=emaSeries(v,26);
  if(!fast.length||!slow.length)return null;
  const off=fast.length-slow.length;
  const difs=slow.map((s,i)=>fast[i+off]-s);
  const dif=difs[difs.length-1];const dea=emaLast(difs,9);
  if(dea===null)return{dif,dea:null,hist:null};
  return{dif,dea,hist:2*(dif-dea)};
}
function calcATR(candles,p=14){
  if(candles.length<p+1)return null;
  const trs=[];
  for(let i=1;i<candles.length;i++){
    const c=candles[i],prev=candles[i-1];
    trs.push(Math.max(c.high-c.low,Math.abs(c.high-prev.close),Math.abs(c.low-prev.close)));
  }
  return trs.slice(-p).reduce((a,b)=>a+b,0)/p;
}
function calcBollinger(closes,p=20,mult=2){
  if(closes.length<p)return null;
  const slice=closes.slice(-p);
  const mid=slice.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(slice.map(x=>(x-mid)**2).reduce((a,b)=>a+b,0)/p);
  return{upper:mid+mult*std,mid,lower:mid-mult*std,std,width:(mult*2*std)/mid*100};
}
// Divergence: compare last 2 swing highs/lows in price vs RSI
function detectDivergence(candles,rsiVals,lookback=20){
  const n=Math.min(candles.length,rsiVals.length,lookback);
  const priceSlice=candles.slice(-n).map(c=>c.close);
  const rsiSlice=rsiVals.slice(-n);
  // find last 2 local highs and lows
  function localExtremes(arr,isHigh){
    const pts=[];
    for(let i=1;i<arr.length-1;i++){
      if(isHigh&&arr[i]>arr[i-1]&&arr[i]>arr[i+1])pts.push({i,v:arr[i]});
      if(!isHigh&&arr[i]<arr[i-1]&&arr[i]<arr[i+1])pts.push({i,v:arr[i]});
    }
    return pts.slice(-2);
  }
  const priceHighs=localExtremes(priceSlice,true);
  const priceLows=localExtremes(priceSlice,false);
  const rsiHighs=localExtremes(rsiSlice,true);
  const rsiLows=localExtremes(rsiSlice,false);
  let bearDiv=false,bullDiv=false;
  // bearish: price higher high, RSI lower high
  if(priceHighs.length>=2&&rsiHighs.length>=2){
    const ph=priceHighs,rh=rsiHighs;
    if(ph[1].v>ph[0].v&&rh[1].v<rh[0].v)bearDiv=true;
  }
  // bullish: price lower low, RSI higher low
  if(priceLows.length>=2&&rsiLows.length>=2){
    const pl=priceLows,rl=rsiLows;
    if(pl[1].v<pl[0].v&&rl[1].v>rl[0].v)bullDiv=true;
  }
  return{bearDiv,bullDiv};
}
// RSI series (sliding window)
function rsiSeries(closes,p){
  const out=[];
  for(let i=p;i<=closes.length;i++){
    out.push(rsi(closes.slice(0,i),p));
  }
  return out;
}
// Key levels: round numbers + recent swing highs/lows
function getKeyLevels(candles,price){
  const closes=candles.map(c=>c.close);
  const highs=candles.map(c=>c.high);
  const lows=candles.map(c=>c.low);
  const levels=[];
  // swing highs
  for(let i=2;i<candles.length-2;i++){
    if(highs[i]>highs[i-1]&&highs[i]>highs[i-2]&&highs[i]>highs[i+1]&&highs[i]>highs[i+2])
      levels.push({price:highs[i],type:'Хай'});
  }
  // swing lows
  for(let i=2;i<candles.length-2;i++){
    if(lows[i]<lows[i-1]&&lows[i]<lows[i-2]&&lows[i]<lows[i+1]&&lows[i]<lows[i+2])
      levels.push({price:lows[i],type:'Лоу'});
  }
  // deduplicate close levels (within 0.5%)
  const deduped=[];
  for(const l of levels){
    const dup=deduped.find(x=>Math.abs(x.price-l.price)/l.price<0.005);
    if(!dup)deduped.push(l);
  }
  // sort and find nearest above/below
  deduped.sort((a,b)=>a.price-b.price);
  const below=deduped.filter(l=>l.price<price).slice(-3);
  const above=deduped.filter(l=>l.price>price).slice(0,3);
  return{below,above};
}

// ---- Format ----
function fp(p){
  if(p==null)return'—';
  if(p>=10000)return p.toFixed(1);if(p>=1000)return p.toFixed(2);
  if(p>=100)return p.toFixed(2);if(p>=1)return p.toFixed(4);
  if(p>=0.01)return p.toFixed(5);return p.toFixed(7);
}
function fn(n,d=2){return n==null?'—':n.toFixed(d);}
function fvol(v){
  if(v==null)return'—';
  if(v>=1e9)return(v/1e9).toFixed(2)+'B';
  if(v>=1e6)return(v/1e6).toFixed(2)+'M';
  if(v>=1e3)return(v/1e3).toFixed(1)+'K';
  return v.toFixed(0);
}
function fpct(v){return v==null?'—':(v>=0?'+':'')+v.toFixed(2)+'%';}
function dir(p,m){if(p==null||m==null)return'';return p>m?'▲':p<m?'▼':'=';}
function dirC(p,m){if(p==null||m==null)return'';return p>m?'up':p<m?'dn':'';}
function rsiC(v){if(v==null)return'';if(v>=80||v<=20)return'crit';if(v>=70||v<=30)return'warn';return'';}
function rsiTag(v){
  if(v==null)return'';if(v>=80)return' ⚠ ЭКСТРИМ';if(v>=70)return' перегрет';
  if(v<=20)return' ⚠ ЭКСТРИМ';if(v<=30)return' перепродан';return'';
}
function distPct(a,b){return((a-b)/b*100);}

// ---- Candle patterns ----
function candleSummary(candles){
  const n=candles.length;
  let bulls=0,bears=0,dojis=0,volUp=0,volDn=0;
  const closes=candles.map(c=>c.close);
  const vols=candles.map(c=>c.qvol);
  const avgVol=vols.reduce((a,b)=>a+b,0)/n;
  const half=Math.floor(n/2);
  const f=closes.slice(0,half).reduce((a,b)=>a+b,0)/half;
  const s=closes.slice(half).reduce((a,b)=>a+b,0)/(n-half);
  const trend=s>f*1.005?'бычий':s<f*0.995?'медвежий':'боковик';
  const last=candles[n-1];
  let consec=1;
  for(let i=n-2;i>=0;i--){
    if((candles[i].close>candles[i].open)===(last.close>last.open))consec++;else break;
  }
  const vol3=vols.slice(-Math.min(3,n)).reduce((a,b)=>a+b,0)/Math.min(3,n);
  const volTrend=vol3>avgVol*1.3?'растёт':vol3<avgVol*0.7?'падает':'норма';
  let upperWicks=0,lowerWicks=0;
  const last5=candles.slice(-Math.min(5,n));
  for(const c of last5){
    const r=c.high-c.low||1;
    if((c.high-Math.max(c.open,c.close))/r>0.35)upperWicks++;
    if((Math.min(c.open,c.close)-c.low)/r>0.35)lowerWicks++;
  }
  for(const c of candles){
    const body=Math.abs(c.close-c.open),range=c.high-c.low||1;
    if(body/range<0.1)dojis++;
    else if(c.close>=c.open)bulls++;
    else bears++;
    if(c.close>=c.open)volUp+=c.qvol;else volDn+=c.qvol;
  }
  const biggest=candles.reduce((a,b)=>Math.abs(b.close-b.open)>Math.abs(a.close-a.open)?b:a);
  const lc=last;const lcR=lc.high-lc.low||1;const lcB=Math.abs(lc.close-lc.open);
  const lcU=(lc.high-Math.max(lc.open,lc.close))/lcR;
  const lcL=(Math.min(lc.open,lc.close)-lc.low)/lcR;
  let lcType='';
  if(lcB/lcR<0.1)lcType='доджи';
  else if(lcB/lcR>0.7)lcType=lc.close>lc.open?'бычья маруботзу':'медвежья маруботзу';
  else if(lcU>0.5&&lcB/lcR<0.3)lcType='падающая звезда↓';
  else if(lcL>0.5&&lcB/lcR<0.3)lcType='молот↑';
  else lcType=lc.close>lc.open?'бычья':'медвежья';
  return{n,bulls,bears,dojis,trend,consec,consecDir:last.close>last.open?'бычьих':'медвежьих',
    volTrend,volUp,volDn,upperWicks,lowerWicks,last5len:last5.length,
    biggestDir:biggest.close>biggest.open?'бычья':'медвежья',biggestPct:Math.abs(biggest.close-biggest.open)/biggest.open*100,
    lcType,lcBodyPct:lcB/lcR*100,lcUpper:lcU*100,lcLower:lcL*100,lc};
}

// ---- Mini chart ----
function renderMiniChart(candles){
  const n=candles.length;
  const allH=candles.map(c=>c.high),allL=candles.map(c=>c.low);
  const gH=Math.max(...allH),gL=Math.min(...allL),range=gH-gL||1;
  const vols=candles.map(c=>c.qvol),maxVol=Math.max(...vols)||1;
  const H=60,VH=18;
  let ch='<div class="candle-chart">';
  for(const c of candles){
    const isBull=c.close>=c.open;
    const bT=((gH-Math.max(c.open,c.close))/range*H);
    const bH=Math.max((Math.abs(c.close-c.open)/range*H),1);
    const wT=((gH-c.high)/range*H);
    const wH=((c.high-c.low)/range*H);
    const col=isBull?'#9be8a8':'#ff9b9b';
    ch+=`<div class="candle-wrap"><div class="wick" style="top:${wT}px;height:${wH}px;left:50%;transform:translateX(-50%)"></div><div class="cbody" style="top:${bT}px;height:${bH}px;background:${col}"></div></div>`;
  }
  ch+='</div><div class="vol-row">';
  for(const c of candles){
    const h=Math.max((c.qvol/maxVol*VH),1);
    ch+=`<div class="vol-col" style="height:${h}px;background:${c.close>=c.open?'#2d4a2e':'#4a2020'}"></div>`;
  }
  ch+='</div>';
  return ch;
}

// ---- Fetch ----
async function fetchKlines(sym,interval,limit){
  const url=`https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=${interval}&limit=${limit}`;
  const res=await fetch(url);if(!res.ok)throw new Error(`HTTP ${res.status}`);
  const data=await res.json();if(!Array.isArray(data)||!data.length)throw new Error('empty');
  return data.map(k=>({open:parseFloat(k[1]),high:parseFloat(k[2]),low:parseFloat(k[3]),close:parseFloat(k[4]),vol:parseFloat(k[5]),qvol:parseFloat(k[7])}));
}
async function fetchTicker(sym){const r=await fetch(`https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=${sym}`);return r.ok?r.json():null;}
async function fetchFunding(sym){const r=await fetch(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${sym}`);return r.ok?r.json():null;}

let lastText='';

async function run(){
  const sym=document.getElementById('sym').value.trim().toUpperCase();
  const N=Math.max(5,Math.min(50,parseInt(document.getElementById('nCandles').value)||20));
  if(!sym)return;
  const btn=document.getElementById('goBtn');
  btn.disabled=true;btn.textContent='...';
  document.getElementById('error').style.display='none';
  document.getElementById('output').style.display='none';
  document.getElementById('empty').style.display='none';

  try{
    const LIMIT=Math.max(250,N+150);
    const[kl15,kl1h,kl4h,kl1d,ticker,funding]=await Promise.all([
      fetchKlines(sym,'15m',LIMIT),fetchKlines(sym,'1h',LIMIT),
      fetchKlines(sym,'4h',LIMIT),fetchKlines(sym,'1d',LIMIT),
      fetchTicker(sym).catch(()=>null),fetchFunding(sym).catch(()=>null),
    ]);
    const klines={'15m':kl15,'1h':kl1h,'4h':kl4h,'1d':kl1d};

    const tfData={};
    for(const tf of TFS){
      const candles=klines[tf.key];
      const closes=candles.map(c=>c.close);
      const vols=candles.map(c=>c.qvol);
      const last=candles[candles.length-1];
      const recent=candles.slice(-N);
      const vol50=vols.slice(-50);
      const avgVol=vol50.reduce((a,b)=>a+b,0)/vol50.length;
      const atr=calcATR(candles,14);
      const boll=calcBollinger(closes,20,2);
      const rsiVals=rsiSeries(closes,6);
      const div=detectDivergence(candles,rsiVals,30);
      const levels=getKeyLevels(candles.slice(-100),last.close);
      const macdVal=calcMACD(closes);
      const r6=rsi(closes,6);
      const ma7=sma(closes,7),ma25=sma(closes,25),ma99=sma(closes,99);
      tfData[tf.key]={
        label:tf.label,price:last.close,
        ma7,ma25,ma99,
        r6,r12:rsi(closes,12),r24:rsi(closes,24),
        macd:macdVal,
        atr,atrPct:atr?atr/last.close*100:null,
        boll,
        div,
        levels,
        hi50:Math.max(...candles.slice(-50).map(c=>c.high)),
        lo50:Math.min(...candles.slice(-50).map(c=>c.low)),
        vol:last.qvol,avgVol,volRatio:last.qvol/avgVol,
        recent,summary:candleSummary(recent),
        distMA7:ma7?distPct(last.close,ma7):null,
        distMA25:ma25?distPct(last.close,ma25):null,
        distMA99:ma99?distPct(last.close,ma99):null,
      };
    }

    const price=tfData['15m'].price;
    const change24=ticker?parseFloat(ticker.priceChangePercent):null;
    const vol24=ticker?parseFloat(ticker.quoteVolume):null;
    const fundingRate=funding?parseFloat(funding.lastFundingRate)*100:null;
    const markPrice=funding?parseFloat(funding.markPrice):null;
    const now=new Date();

    // ---- CHECKLIST ----
    const d1=tfData['1d'],d4=tfData['4h'],d1h=tfData['1h'],d15=tfData['15m'];
    const checks=[];
    // 1. 1D trend
    const trend1d=d1.ma7&&d1.price>d1.ma7&&d1.ma7>d1.ma25?'бычий':d1.ma7&&d1.price<d1.ma7&&d1.ma7<d1.ma25?'медвежий':'боковик';
    checks.push({ok:trend1d!=='боковик',label:`Тренд 1D: ${trend1d}`,neutral:trend1d==='боковик'});
    // 2. 4H confirms
    const trend4h=d4.r6>50&&d4.macd&&d4.macd.hist>0?'бычий':d4.r6<50&&d4.macd&&d4.macd.hist<0?'медвежий':'нейтральный';
    checks.push({ok:trend4h!=='нейтральный',label:`4H подтверждает: ${trend4h}`,neutral:trend4h==='нейтральный'});
    // 3. RSI not extreme against direction
    const rsiOk=d1h.r6>20&&d1h.r6<80;
    checks.push({ok:rsiOk,label:`RSI(6) 1H: ${fn(d1h.r6)} — ${rsiOk?'допустимый':'ЭКСТРИМ ⚠'}`});
    // 4. Volume above avg
    const volOk=d15.volRatio>0.8;
    checks.push({ok:volOk,label:`Объём 15M: ${fn(d15.volRatio,2)}x avg — ${volOk?'норма':'низкий'}`});
    // 5. MACD direction
    const macdOk=d1h.macd&&d1h.macd.hist!==null&&d1h.macd.dif!==null;
    const macdDir=macdOk?(d1h.macd.hist>0?'положительный':'отрицательный'):'нет данных';
    checks.push({ok:macdOk&&d1h.macd.hist!==null,label:`MACD 1H: ${macdDir}`,neutral:!macdOk});
    // 6. No divergence against trade
    const divWarn=d1h.div.bearDiv||d1h.div.bullDiv;
    checks.push({ok:!divWarn,label:`Дивергенция 1H: ${d1h.div.bearDiv?'медвежья ⚠':d1h.div.bullDiv?'бычья ↑':'нет'}`});
    // 7. Bollinger not at extreme
    const bollOk=d1h.boll&&price>d1h.boll.lower&&price<d1h.boll.upper;
    checks.push({ok:bollOk,label:`Bollinger 1H: ${bollOk?'внутри полос':'за полосой ⚠'}`});
    // 8. Funding
    const fundOk=fundingRate==null||Math.abs(fundingRate)<0.1;
    checks.push({ok:fundOk,label:`Funding: ${fundingRate!=null?((fundingRate>=0?'+':'')+fundingRate.toFixed(4)+'%'):'—'} ${fundOk?'норма':'ЭКСТРИМ ⚠'}`});

    const score=checks.filter(c=>c.ok).length;
    const scoreColor=score>=7?'#9be8a8':score>=5?'#ffb86b':'#ff9b9b';
    const scoreLabel=score>=7?'СЕТАП СИЛЬНЫЙ — можно рассматривать вход':score>=5?'СЕТАП СРЕДНИЙ — осторожно, уменьши размер':'СЕТАП СЛАБЫЙ — лучше пропустить';

    let clHtml=`<div class="checklist-title">ЧЕКЛИСТ ВХОДА</div>`;
    for(const c of checks){
      const icon=c.neutral?'○':c.ok?'✓':'✗';
      const color=c.neutral?'#5a6a6b':c.ok?'#9be8a8':'#ff9b9b';
      clHtml+=`<div class="check-row"><span class="check-icon" style="color:${color}">${icon}</span><span style="color:${color}">${c.label}</span></div>`;
    }
    clHtml+=`<div class="score-bar"><div class="score-fill" style="width:${score/checks.length*100}%;background:${scoreColor}"></div></div>`;
    clHtml+=`<div class="score-label" style="color:${scoreColor}">${score}/${checks.length} — ${scoreLabel}</div>`;
    document.getElementById('checklist').innerHTML=clHtml;

    // ---- TICKER BAR ----
    const tb=document.getElementById('tickerBar');
    const chC=change24==null?'':change24>=0?'up':'dn';
    const chS=change24==null?'':change24>=0?'+':'';
    let fHtml='';
    if(fundingRate!=null){
      const fc=Math.abs(fundingRate)>0.1?'crit':Math.abs(fundingRate)>0.05?'warn':'';
      const fd=fundingRate>0.05?' (лонги платят)':fundingRate<-0.05?' (шорты платят)':'';
      fHtml=`<span>Funding: <span class="${fc}">${fundingRate>=0?'+':''}${fundingRate.toFixed(4)}%</span><span style="color:#3a4e50;font-size:10px">${fd}</span></span>`;
    }
    tb.innerHTML=`<div><span class="ticker-sym">${sym}</span><span class="ticker-price ${chC}" style="margin-left:12px">${fp(price)}</span><span class="${chC}" style="margin-left:8px;font-size:13px">${chS}${fn(change24)}%</span></div>
    <div class="ticker-stats"><span>Объём 24h: <strong style="color:#d8e0e0">${fvol(vol24)} USDT</strong></span>${fHtml}${markPrice?`<span style="color:#3a4e50">Mark: ${fp(markPrice)}</span>`:''}</div>`;

    // ---- CARDS ----
    const cards=document.getElementById('cards');cards.innerHTML='';
    const tl=[
      `${sym} — ${fp(price)} USDT`,`${now.toLocaleString('ru')}`,
      change24!=null?`Изменение 24h: ${chS}${fn(change24)}%`:'',
      vol24!=null?`Объём 24h: ${fvol(vol24)} USDT`:'',
      fundingRate!=null?`Funding: ${fundingRate>=0?'+':''}${fundingRate.toFixed(4)}%`:'',
      ``,`ЧЕКЛИСТ: ${score}/${checks.length} — ${scoreLabel}`,
      ...checks.map(c=>`${c.ok?'✓':'✗'} ${c.label}`),``
    ];

    for(const tf of TFS){
      const t=tfData[tf.key];const s=t.summary;
      const vrC=t.volRatio>2?'crit':t.volRatio>1.5?'warn':t.volRatio<0.5?'dn':'';
      const vrT=t.volRatio>2?' ⚠ АНОМАЛ':t.volRatio>1.5?' высокий':t.volRatio<0.5?' низкий':'';
      const volBP=((s.volUp/(s.volUp+s.volDn||1))*100).toFixed(0);
      const atrStop=t.atr?t.price-1.5*t.atr:null;
      const atrStopS=t.atr?t.price+1.5*t.atr:null;
      const bollW=t.boll?t.boll.width:null;
      const bollState=t.boll?(bollW<3?'СЖАТИЕ ⚡':bollW>8?'расширение':'норма'):'—';
      const priceInBoll=t.boll?(t.price>=t.boll.upper?'выше верхней ⚠':t.price<=t.boll.lower?'ниже нижней ⚠':t.price>t.boll.mid?'выше средней':'ниже средней'):'—';

      const card=document.createElement('div');card.className='card';
      let html=`<div class="card-head"><span class="tf-label">${t.label}</span><span class="muted">хай50 ${fp(t.hi50)} · лоу50 ${fp(t.lo50)}</span></div>`;

      // mini chart
      html+=`<div class="section-label">ГРАФИК (${s.n} свечей)</div>`;
      html+=renderMiniChart(t.recent);
      html+=`<div class="line">
        <span class="up">▲${s.bulls}б</span><span class="muted"> · </span><span class="dn">▼${s.bears}м</span><span class="muted"> · </span><span class="muted">≈${s.dojis}д</span>
        <span class="muted">  |  </span><span class="${s.trend==='бычий'?'up':s.trend==='медвежий'?'dn':'muted'}">${s.trend}</span>
        <span class="muted">  |  ${s.consec} ${s.consecDir} подряд</span>
      </div>
      <div class="line">
        <span class="muted">Посл.: </span><span class="${s.lc.close>=s.lc.open?'up':'dn'}">${s.lcType}</span>
        <span class="muted"> тело:${fn(s.lcBodyPct)}% в↑${fn(s.lcUpper)}% н↓${fn(s.lcLower)}%</span>
        <span class="muted">  |  тени(5): в${s.upperWicks} н${s.lowerWicks}</span>
      </div>`;

      // ATR
      html+=`<div class="section-label">ATR(14) — ВОЛАТИЛЬНОСТЬ</div>
      <div class="line">
        ATR: <span class="warn">${fp(t.atr)}</span> = <span class="warn">${fn(t.atrPct)}%</span> от цены
        <span class="muted">  |  Стоп лонг: </span><span class="dn">${fp(atrStop)}</span>
        <span class="muted">  |  Стоп шорт: </span><span class="up">${fp(atrStopS)}</span>
      </div>`;

      // Bollinger
      html+=`<div class="section-label">БОЛЛИНДЖЕР(20,2)</div>
      <div class="line">
        <span class="up">${fp(t.boll?.upper)}</span> · <span class="muted">${fp(t.boll?.mid)}</span> · <span class="dn">${fp(t.boll?.lower)}</span>
        <span class="muted">  Ширина: ${fn(bollW)}% — <span class="${bollW<3?'warn':''}">${bollState}</span></span>
      </div>
      <div class="line">Цена: <span class="${t.price>=t.boll?.upper||t.price<=t.boll?.lower?'warn':''}">${priceInBoll}</span></div>`;

      // Divergence
      html+=`<div class="section-label">ДИВЕРГЕНЦИЯ RSI(6)</div>
      <div class="line">
        ${t.div.bearDiv?`<span class="div-badge" style="background:#4a1a1a;color:#ff9b9b">⚠ МЕДВЕЖЬЯ — цена выше, RSI ниже</span>`:''}
        ${t.div.bullDiv?`<span class="div-badge" style="background:#1a3a1a;color:#9be8a8">↑ БЫЧЬЯ — цена ниже, RSI выше</span>`:''}
        ${!t.div.bearDiv&&!t.div.bullDiv?'<span class="muted">нет</span>':''}
      </div>`;

      // Volume
      html+=`<div class="section-label">ОБЪЁМ</div>
      <div class="line">
        <span class="${vrC}">${fvol(t.vol)}</span><span class="${vrC}" style="font-size:10px">${vrT}</span>
        <span class="muted">  avg50: ${fvol(t.avgVol)}  ratio: ${fn(t.volRatio,2)}x</span>
      </div>
      <div class="line"><span class="up">покуп ${volBP}%</span> · <span class="dn">прод ${100-parseInt(volBP)}%</span> <span class="muted">(за ${s.n} св)</span></div>`;

      // MA + distance
      html+=`<div class="section-label">СКОЛЬЗЯЩИЕ + РАССТОЯНИЕ</div>
      <div class="line">
        <span class="muted">MA7 </span>${fp(t.ma7)} <span class="${dirC(t.price,t.ma7)}">${dir(t.price,t.ma7)}</span> <span class="muted">${fpct(t.distMA7)}</span>
        <span class="muted">  MA25 </span>${fp(t.ma25)} <span class="${dirC(t.price,t.ma25)}">${dir(t.price,t.ma25)}</span> <span class="muted">${fpct(t.distMA25)}</span>
        <span class="muted">  MA99 </span>${fp(t.ma99)} <span class="${dirC(t.price,t.ma99)}">${dir(t.price,t.ma99)}</span> <span class="muted">${fpct(t.distMA99)}</span>
      </div>`;

      // RSI
      html+=`<div class="section-label">RSI</div>
      <div class="line">
        <span class="muted">RSI(6) </span><span class="${rsiC(t.r6)}">${fn(t.r6)}</span><span class="${rsiC(t.r6)}" style="font-size:10px">${rsiTag(t.r6)}</span>
        <span class="muted">  RSI(12) </span>${fn(t.r12)}<span class="muted">  RSI(24) </span>${fn(t.r24)}
      </div>`;

      // MACD
      html+=`<div class="section-label">MACD</div>`;
      if(t.macd){html+=`<div class="line"><span class="muted">MACD </span><span class="${t.macd.hist>=0?'up':'dn'}">${fn(t.macd.hist,4)}</span><span class="muted">  DIF </span>${fn(t.macd.dif,4)}<span class="muted">  DEA </span>${fn(t.macd.dea,4)}</div>`;}

      // Key levels
      html+=`<div class="section-label">УРОВНИ</div>`;
      if(t.levels.above.length||t.levels.below.length){
        html+='<div>';
        for(const l of [...t.levels.above].reverse()){
          const d=distPct(l.price,t.price);
          html+=`<div class="level-row"><span class="up">Сопр · ${fp(l.price)}</span><span class="muted">${l.type}</span><span class="up">+${fn(d)}%</span></div>`;
        }
        html+=`<div class="level-row" style="border-top:1px solid #2e3a3b;border-bottom:1px solid #2e3a3b;"><span style="color:#fff">▶ ${fp(t.price)}</span><span class="muted">ТЕКУЩАЯ</span><span></span></div>`;
        for(const l of t.levels.below){
          const d=distPct(l.price,t.price);
          html+=`<div class="level-row"><span class="dn">Подд · ${fp(l.price)}</span><span class="muted">${l.type}</span><span class="dn">${fn(d)}%</span></div>`;
        }
        html+='</div>';
      }else{html+='<div class="line muted">недостаточно данных</div>';}

      card.innerHTML=html;cards.appendChild(card);

      // text
      tl.push(`[${t.label}] ${fp(t.price)} USDT`);
      tl.push(`График ${s.n}св: ${s.bulls}б/${s.bears}м/${s.dojis}д | ${s.trend} | ${s.consec} ${s.consecDir} подряд`);
      tl.push(`Посл.свеча: ${s.lcType} тело:${fn(s.lcBodyPct)}% в:${fn(s.lcUpper)}% н:${fn(s.lcLower)}%`);
      tl.push(`ATR(14): ${fp(t.atr)} (${fn(t.atrPct)}%) | Стоп-лонг: ${fp(atrStop)} | Стоп-шорт: ${fp(atrStopS)}`);
      tl.push(`Boll: верх ${fp(t.boll?.upper)} · mid ${fp(t.boll?.mid)} · низ ${fp(t.boll?.lower)} | Ширина: ${fn(bollW)}% ${bollState}`);
      tl.push(`Дивергенция: ${t.div.bearDiv?'⚠ МЕДВЕЖЬЯ':t.div.bullDiv?'↑ БЫЧЬЯ':'нет'}`);
      tl.push(`Объём: ${fvol(t.vol)} (ratio:${fn(t.volRatio,2)}x${vrT}) | покуп:${volBP}% прод:${100-parseInt(volBP)}%`);
      tl.push(`MA7: ${fp(t.ma7)} (${dir(t.price,t.ma7)} ${fpct(t.distMA7)}) MA25: ${fp(t.ma25)} (${dir(t.price,t.ma25)} ${fpct(t.distMA25)}) MA99: ${fp(t.ma99)} (${dir(t.price,t.ma99)} ${fpct(t.distMA99)})`);
      tl.push(`RSI(6): ${fn(t.r6)}${rsiTag(t.r6)}  RSI(12): ${fn(t.r12)}  RSI(24): ${fn(t.r24)}`);
      if(t.macd)tl.push(`DIF: ${fn(t.macd.dif,6)} DEA: ${fn(t.macd.dea,6)} MACD: ${fn(t.macd.hist,6)}`);
      if(t.levels.above.length)tl.push(`Сопр: `+t.levels.above.map(l=>`${fp(l.price)}(+${fn(distPct(l.price,t.price))}%)`).join(' · '));
      if(t.levels.below.length)tl.push(`Подд: `+t.levels.below.map(l=>`${fp(l.price)}(${fn(distPct(l.price,t.price))}%)`).join(' · '));
      tl.push(`Хай50: ${fp(t.hi50)}  Лоу50: ${fp(t.lo50)}`);
      tl.push('');
    }

    lastText=tl.join('\n').trim();
    document.getElementById('rTs').textContent=now.toLocaleString('ru');
    document.getElementById('output').style.display='block';
    document.getElementById('copyBtn').className='copy-btn';
    document.getElementById('copyBtn').textContent='КОПИРОВАТЬ СВОДКУ';
  }catch(e){
    document.getElementById('error').textContent='⚠ '+e.message;
    document.getElementById('error').style.display='block';
    document.getElementById('empty').style.display='block';
  }
  btn.disabled=false;btn.textContent='GO';
}

async function copyText(){
  if(!lastText)return;
  try{await navigator.clipboard.writeText(lastText);}
  catch{
    const ta=document.createElement('textarea');ta.value=lastText;
    ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);
  }
  const b=document.getElementById('copyBtn');
  b.textContent='✓ СКОПИРОВАНО';b.className='copy-btn ok';
  setTimeout(()=>{b.textContent='КОПИРОВАТЬ СВОДКУ';b.className='copy-btn';},2500);
}
document.getElementById('sym').addEventListener('keydown',e=>{if(e.key==='Enter')run();});
</script>
</body>
</html>
